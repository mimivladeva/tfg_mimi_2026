amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    update_min_d: 0.1 #0.05
    update_min_a: 0.3 #0.1
    resample_interval: 1
    min_particles: 500
    max_particles: 2000
    use_sim_time: true
    base_frame_id: base_link
    odom_frame_id: odom
    scan_topic: scan
    transform_tolerance: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5

planner_server:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"


controller_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    max_vel_theta: 1.0
    min_vel_theta: 0.0
    acc_lim_theta: 3.2

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5 #3
      yaw_goal_tolerance: 0.30 #0.05
      stateful: false #true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.18
      max_linear_vel: 0.25
      min_linear_vel: 0.00 
      use_velocity_scaling: true
      min_lookahead_dist: 0.20 
      lookahead_dist: 0.6
      max_lookahead_dist: 0.9  
      max_linear_accel: 0.4
      max_linear_decel: 0.4
      rotate_to_heading_angular_vel: 2.0 #3.2
      max_angular_accel: 2.0 #7.0
      transform_tolerance: 0.2
      use_rotate_to_heading: true #false #true
      allow_reversing: false
      regulate_linear_velocity: true
      use_velocity_scaled_lookahead_dist: false
      use_interpolation: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    transform_tolerance: 0.5
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    max_rotational_vel: 2.5
    min_rotational_vel: 1.5
    rotational_acc_lim: 6.0

    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      transform_tolerance: 0.5
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      update_frequency: 5.0
      publish_frequency: 5.0
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.20
        cost_scaling_factor: 2.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      transform_tolerance: 0.5
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      update_frequency: 10.0 #5.0
      publish_frequency: 10.0 #5.0
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          obstacle_range: 2.5
          raytrace_range: 3.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5