controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25
      # importante para que pueda escalar y limitar
      use_velocity_scaling: true
      # opcional:
      min_linear_vel: 0.0
      max_linear_vel: 0.25

      # Velocidades
      min_vel_x: 0.0
      max_vel_x: 0.25
      min_speed_xy: 0.0
      max_speed_xy: 0.25

      # Angular
      min_vel_theta: -1.0
      max_vel_theta: 1.0

      # Aceleraciones
      acc_lim_x: 2.5
      decel_lim_x: -2.5
      acc_lim_theta: 3.2

      # Tolerancias
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.10

      # Simulación interna
      sim_time: 1.5
      vx_samples: 20
      vtheta_samples: 40

      critics: ["ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      ObstacleFootprint.scale: 1.0
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalAlign.scale: 24.0
      GoalDist.scale: 24.0
      
behavior_server:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    wait:
      plugin: "nav2_behaviors::Wait"

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      transform_tolerance: 0.5
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      update_frequency: 5.0
      publish_frequency: 5.0
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      transform_tolerance: 0.5
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      update_frequency: 5.0
      publish_frequency: 5.0
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    transform_tolerance: 0.5